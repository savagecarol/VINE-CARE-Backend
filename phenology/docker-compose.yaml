version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: phenology/Dockerfile
    restart: always
    ports:
      - "8002:8002"
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
             gunicorn phenology.wsgi:application --bind 0.0.0.0:8002 --workers 3"