version: '3.8'

services:
  web:
    build:
      context: ..          # ← build context is backend/ folder
      dockerfile: Data-Collection/Dockerfile   # ← Dockerfile location
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
             gunicorn datacollection.wsgi:application --bind 0.0.0.0:8000 --workers 3"